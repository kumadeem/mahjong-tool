
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>　麻雀成績管理</title>

<style>

body{
  margin:0;
  padding:20px;
  background:linear-gradient(to bottom,#062d1d,#0d5c3a);
  color:white;
  font-family:sans-serif;
}

h1,h2{
  text-align:center;
}

.box{
  background:rgba(0,0,0,0.6);
  border:1px solid gold;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 15px rgba(255,215,0,0.3);
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:16px;
  box-sizing:border-box;
  background:#1f1f1f;
  color:white;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:gold;
  color:black;
  font-weight:bold;
  font-size:16px;
}

button:hover{
  opacity:0.9;
}

.card{
  background:#1c1c1c;
  border-radius:15px;
  padding:15px;
  margin-top:10px;
}

.plus{
  color:#00ff99;
  font-weight:bold;
}

.minus{
  color:#ff6666;
  font-weight:bold;
}

.historyItem{
  background:#202020;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<h1>🀄  麻雀成績管理</h1>

<div class="box">
<h2>設定</h2>

<select id="mode">
<option value="4">4麻</option>
<option value="3">3麻</option>
</select>

<input type="number" id="rate" value="500" placeholder="レート">
<input type="number" id="oka" value="20" placeholder="オカ">
<input type="text" id="uma" value="10,20" placeholder="ウマ">

</div>

<div class="box">
<h2>対局入力</h2>

<input type="text" id="name1" placeholder="1位 名前">
<input type="number" id="score1" placeholder="1位 スコア">

<input type="text" id="name2" placeholder="2位 名前">
<input type="number" id="score2" placeholder="2位 スコア">

<input type="text" id="name3" placeholder="3位 名前">
<input type="number" id="score3" placeholder="3位 スコア">

<div id="player4">
<input type="text" id="name4" placeholder="4位 名前">
<input type="number" id="score4" placeholder="4位 スコア">
</div>

<button onclick="saveGame()">保存</button>

</div>

<div class="box">
<h2>精算</h2>
<div id="settlement"></div>
</div>

<div class="box">
<h2>履歴</h2>
<div id="history"></div>
</div>

<script>

let historyData = JSON.parse(localStorage.getItem("historyData")) || [];

function toggleMode(){

  const mode = document.getElementById("mode").value;

  if(mode == "3"){
    document.getElementById("player4").style.display = "none";
  }else{
    document.getElementById("player4").style.display = "block";
  }
}

function saveGame(){

  const mode = Number(document.getElementById("mode").value);
  const rate = Number(document.getElementById("rate").value);

  const players = [];

  for(let i=1;i<=mode;i++){

    const name = document.getElementById("name"+i).value;
    const score = Number(document.getElementById("score"+i).value);

    players.push({
      rank:i,
      name:name,
      score:score,
      money:score * rate / 100
    });
  }

  historyData.unshift({
    date:new Date().toLocaleString(),
    players:players
  });

  localStorage.setItem(
    "historyData",
    JSON.stringify(historyData)
  );

  renderSettlement(players);
  renderHistory();
}

function renderSettlement(players){

  const box = document.getElementById("settlement");

  box.innerHTML = "";

  players.forEach(p=>{

    const div = document.createElement("div");

    div.className = "card";

    div.innerHTML = `
      <h3>${p.name}</h3>
      <p class="${p.money >= 0 ? 'plus':'minus'}">
      ${p.money >=0 ? '+' : ''}
      ${Math.round(p.money).toLocaleString()} 円
      </p>
    `;

    box.appendChild(div);
  });

  autoSettlement(players);
}

function autoSettlement(players){

  const plus = players.filter(p=>p.money > 0);
  const minus = players.filter(p=>p.money < 0);

  const box = document.getElementById("settlement");

  const title = document.createElement("h3");
  title.innerText = "自動精算";

  box.appendChild(title);

  minus.forEach(m=>{

    let debt = Math.abs(m.money);

    plus.forEach(p=>{

      if(debt <= 0) return;

      if(p.money <= 0) return;

      const pay = Math.min(debt,p.money);

      p.money -= pay;
      debt -= pay;

      const div = document.createElement("div");

      div.className = "historyItem";

      div.innerHTML = `
      ${m.name} → ${p.name}
      ：${Math.round(pay).toLocaleString()}円
      `;

      box.appendChild(div);
    });
  });
}

function renderHistory(){

  const history = document.getElementById("history");

  history.innerHTML = "";

  historyData.forEach(game=>{

    const div = document.createElement("div");

    div.className = "historyItem";

    let html = `<b>${game.date}</b><br>`;

    game.players.forEach(p=>{

      html += `${p.rank}位 ${p.name} (${p.score})<br>`;
    });

    div.innerHTML = html;

    history.appendChild(div);
  });
}

renderHistory();
toggleMode();

</script>

</body>
```
