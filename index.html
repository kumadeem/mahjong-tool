<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀成績管理</title>

<style>
body{
    margin:0;
    background:#0d3b2e;
    color:white;
    font-family:sans-serif;
}

header{
    text-align:center;
    padding:20px;
    font-size:32px;
    font-weight:bold;
}

.nav{
    display:flex;
    justify-content:space-around;
    background:#111;
    padding:10px;
    position:sticky;
    top:0;
}

.nav button{
    background:#1f1f1f;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-size:15px;
}

.page{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

.box{
    background:rgba(0,0,0,0.5);
    border:1px solid gold;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#1f1f1f;
    color:white;
    box-sizing:border-box;
}

button.main{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:gold;
    color:black;
    font-weight:bold;
    font-size:16px;
}

.playerCard{
    background:#1a1a1a;
    border-radius:12px;
    padding:15px;
    margin-top:10px;
}

.moneyPlus{
    color:#6dff6d;
}

.moneyMinus{
    color:#ff7b7b;
}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #333;
    text-align:center;
}
</style>
</head>
<body>

<div id="homeScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(to bottom,#061d1d,#0d5c3a);display:flex;justify-content:center;align-items:center;z-index:9999;flex-direction:column;">
    <h1 style="font-size:50px;color:white;margin-bottom:30px;">麻雀成績管理</h1>
    <button onclick="startApp()" style="padding:20px 50px;font-size:24px;border:none;border-radius:20px;background:gold;color:black;font-weight:bold;cursor:pointer;">
        START
    </button>
</div>

<header>
麻雀成績管理
</header>

<div class="nav">
    <button onclick="showPage('home')">ホーム</button>
    <button onclick="showPage('match')">対局入力</button>
    <button onclick="showPage('settlement')">精算</button>
    <button onclick="showPage('players')">プレイヤー</button>
    <button onclick="showPage('settings')">設定</button>
</div>

<div id="home" class="page active">
    <div class="box">
        <h2>ホーム</h2>
        <p>麻雀成績管理アプリ</p>
        <p>現在登録人数: <span id="playerCount">0</span>人</p>
    </div>
</div>

<div id="match" class="page">
    <div class="box">
        <h2>対局入力</h2>

        <select id="mode">
            <option value="4">4麻</option>
            <option value="3">3麻</option>
        </select>

        <input id="rate" type="number" placeholder="レート">

        <div id="inputs"></div>

        <button class="main" onclick="saveMatch()">
            保存
        </button>
    </div>
</div>

<div id="settlement" class="page">
    <div class="box">
        <h2>精算</h2>

        <div id="settlementList"></div>
    </div>
</div>

<div id="players" class="page">
    <div class="box">
        <h2>アカウント作成</h2>

        <input id="newPlayer" placeholder="プレイヤー名">

        <button class="main" onclick="addPlayer()">
            プレイヤー追加
        </button>
    </div>

    <div class="box">
        <h2>プレイヤー一覧</h2>

        <div id="playerList"></div>
    </div>
</div>

<div id="settings" class="page">
    <div class="box">
        <h2>設定</h2>

        <input id="uma" placeholder="ウマ 例: 10,20">
        <input id="oka" placeholder="オカ">
        <input id="chip" placeholder="チップレート">

        <button class="main" onclick="saveSettings()">
            設定保存
        </button>
    </div>
</div>

<script>
const pages = document.querySelectorAll('.page');

function showPage(id){
    pages.forEach(page=>{
        page.classList.remove('active');
    });

    document.getElementById(id).classList.add('active');
}

let players = JSON.parse(localStorage.getItem('players')) || {};
let matches = JSON.parse(localStorage.getItem('matches')) || [];

function renderInputs(){
    const area = document.getElementById('inputs');
    area.innerHTML = '';

    const mode = Number(document.getElementById('mode').value);

    for(let i=1;i<=mode;i++){
        area.innerHTML += `
            <select id="name${i}">
                <option value="">${i}位 プレイヤー選択</option>
                ${Object.keys(players).map(name=>
                    `<option value="${name}">${name}</option>`
                ).join('')}
            </select>

            <input id="score${i}" type="number" placeholder="${i}位 スコア">
        `;
    }
}

function addPlayer(){
    const name = document.getElementById('newPlayer').value;

    if(!name) return;

    if(players[name]){
        alert('既に存在します');
        return;
    }

    players[name] = {
        games:0,
        first:0,
        last:0,
        totalRank:0,
        money:0
    };

    localStorage.setItem('players', JSON.stringify(players));

    document.getElementById('newPlayer').value = '';

    renderPlayers();
    renderInputs();
}

function renderPlayers(){
    const list = document.getElementById('playerList');
    list.innerHTML = '';

    Object.keys(players).forEach(name=>{

        const p = players[name];

        const avg = p.games ?
            (p.totalRank / p.games).toFixed(2) : 0;

        const firstRate = p.games ?
            ((p.first / p.games) * 100).toFixed(1) : 0;

        list.innerHTML += `
            <div class="playerCard">
                <h3>${name}</h3>

                <p>対局数: ${p.games}</p>
                <p>平均順位: ${avg}</p>
                <p>1位率: ${firstRate}%</p>

                <p class="${p.money >= 0 ? 'moneyPlus':'moneyMinus'}">
                    収支: ${Math.round(p.money).toLocaleString()}円
                </p>
            </div>
        `;
    });

    document.getElementById('playerCount').innerText =
        Object.keys(players).length;
}

function saveMatch(){
    const mode = Number(document.getElementById('mode').value);
    const rate = Number(document.getElementById('rate').value);

    let data = [];

    for(let i=1;i<=mode;i++){

        const name = document.getElementById('name'+i).value;
        const score = Number(document.getElementById('score'+i).value);

        if(!name){
            alert('プレイヤー選択');
            return;
        }

        data.push({
            rank:i,
            name,
            score
        });
    }

    data.forEach(player=>{

        const money = player.score * rate;

        players[player.name].games += 1;
        players[player.name].totalRank += player.rank;
        players[player.name].money += money;

        if(player.rank === 1){
            players[player.name].first += 1;
        }

        if(player.rank === mode){
            players[player.name].last += 1;
        }
    });

    matches.push(data);

    localStorage.setItem('players', JSON.stringify(players));
    localStorage.setItem('matches', JSON.stringify(matches));

    renderPlayers();
    renderSettlement();

    alert('保存完了');
}

function renderSettlement(){

    const area = document.getElementById('settlementList');
    area.innerHTML = '';

    const sorted = Object.entries(players)
        .sort((a,b)=>b[1].money-a[1].money);

    let html = '<table>';

    html += `
        <tr>
            <th>名前</th>
            <th>収支</th>
        </tr>
    `;

    sorted.forEach(([name,data])=>{

        html += `
            <tr>
                <td>${name}</td>
                <td class="${data.money >=0 ? 'moneyPlus':'moneyMinus'}">
                    ${Math.round(data.money).toLocaleString()}円
                </td>
            </tr>
        `;
    });

    html += '</table>';

    area.innerHTML = html;
}

function saveSettings(){

    const settings = {
        uma:document.getElementById('uma').value,
        oka:document.getElementById('oka').value,
        chip:document.getElementById('chip').value
    };

    localStorage.setItem('settings', JSON.stringify(settings));

    alert('設定保存');
}

renderPlayers();
renderSettlement();
renderInputs();
function startApp(){
    document.getElementById('homeScreen').style.display = 'none';
}

</script>

</body>
</html>
