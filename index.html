<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀成績管理</title>

<style>

body{
margin:0;
padding:0;
font-family:sans-serif;
background:linear-gradient(to bottom,#062d1d,#0d5c3a);
color:white;
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(to bottom,#061d1d,#0d5c3a);
z-index:9999;
}

#startScreen h1{
font-size:50px;
margin-bottom:30px;
}

#startScreen button{
padding:20px 50px;
font-size:24px;
border:none;
border-radius:20px;
background:gold;
font-weight:bold;
}

.nav{
display:flex;
justify-content:space-around;
padding:20px;
background:#111;
position:sticky;
top:0;
}

.nav button{
padding:15px 25px;
border:none;
border-radius:15px;
background:#1e1e1e;
color:white;
font-size:16px;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.box{
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:20px;
border:1px solid gold;
margin-bottom:20px;
}

input,select{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1e1e1e;
color:white;
font-size:16px;
box-sizing:border-box;
}

button{
cursor:pointer;
}

.mainBtn{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:gold;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.playerCard{
display:flex;
align-items:center;
gap:15px;
background:#1b1b1b;
padding:15px;
border-radius:15px;
margin-top:10px;
}

.playerCard img{
width:60px;
height:60px;
border-radius:50%;
object-fit:cover;
}

#scoreTable{
width:100%;
border-collapse:collapse;
text-align:center;
background:#0d3b2d;
}

#scoreTable th,
#scoreTable td{
border:1px solid gray;
padding:10px;
}

#scoreTable input{
width:90%;
padding:10px;
margin:0;
}

</style>
</head>
<body>

<div id="startScreen">
<h1>麻雀成績管理</h1>
<button onclick="startApp()">START</button>
</div>

<div class="nav">
<button onclick="showPage('match')">対局入力</button>
<button onclick="showPage('players')">プレイヤー</button>
<button onclick="showPage('settings')">設定</button>
</div>

<div id="match" class="page active">

<h2>麻雀スコアシート</h2>

<div class="box">

<select id="mode">
<option value="4">4麻</option>
<option value="3">3麻</option>
</select>

<input id="rate" placeholder="レート">

<input id="uma" placeholder="ウマオカ 例:10,20">

<button class="mainBtn" onclick="startMatch()">
対局開始
</button>

</div>

<div class="box">

<table id="scoreTable">
<thead>
<tr>
<th>局</th>
<th>
<select id="player1Select"></select>
</th>

<th>
<select id="player2Select"></select>
</th>

<th>
<select id="player3Select"></select>
</th>

<th>
<select id="player4Select"></select>
</th>
</tr>
</thead>

<tbody id="scoreBody"></tbody>

</table>

<button class="mainBtn" onclick="addRound()">
局追加
</button>

<button class="mainBtn" onclick="calculateTotal()">
集計
</button>

<div id="totalResult"></div>

</div>

</div>

<div id="settlement" class="page">
<h2>精算</h2>
<div class="box">
<div id="settlementResult">
まだ集計されていません
</div>
</div>
</div>

<div id="players" class="page">

<h2>プレイヤー管理</h2>

<div class="box">

<input id="newPlayer" placeholder="プレイヤー名">

<input
id="newIcon"
type="file"
accept="image/*">

<button class="mainBtn" onclick="addPlayer()">
追加
</button>

</div>

<div id="playerList"></div>

</div>

<div id="settings" class="page">

<h2>設定</h2>

<div class="box">

<p>今後追加予定</p>

</div>

</div>

<script>

let players = JSON.parse(
localStorage.getItem('players')
) || {};

function startApp(){

document
.getElementById('startScreen')
.style.display = 'none';

}

function showPage(id){

const pages = document
.querySelectorAll('.page');

pages.forEach(page=>{
page.classList.remove('active');
});


document
.getElementById(id)
.classList.add('active');

}

function addPlayer(){

const name = document
.getElementById('newPlayer')
.value;

const file = document
.getElementById('newIcon')
.files[0];

if(!name){
alert('名前を入力');
return;
}

const savePlayer = (icon)=>{

players[name] = {
icon:icon,
};

localStorage.setItem(
'players',
JSON.stringify(players)
);

renderPlayers();

};

if(file){

const reader = new FileReader();

reader.onload = function(e){
savePlayer(e.target.result);
};

reader.readAsDataURL(file);

}else{

savePlayer('https://cdn-icons-png.flaticon.com/512/149/149071.png');

}

}

function renderPlayers(){

const list = document
.getElementById('playerList');

list.innerHTML = '';

for(const name in players){

const div = document.createElement('div');

div.className = 'playerCard';

div.innerHTML = `
<img src="${players[name].icon}">
<h3>${name}</h3>
`;

list.appendChild(div);

}

}

let roundCount = 0;

function startMatch(){

roundCount = 0;

const body = document
.getElementById('scoreBody');

body.innerHTML = '';

addRound();

}

function addRound(){

roundCount++;

const mode = Number(
document.getElementById('mode').value
);

const tbody = document
.getElementById('scoreBody');

const tr = document.createElement('tr');

let html = `
<td>${roundCount}</td>
`;

for(let i=1;i<=mode;i++){

html += `
<td>
<input class="player${i}" type="number">
</td>
`;

}

tr.innerHTML = html;

tbody.appendChild(tr);

}

function calculateTotal(){

const mode = Number(
document.getElementById('mode').value
);

let result = '<h3>合計結果</h3>';

for(let i=1;i<=mode;i++){

let total = 0;

const inputs = document
.querySelectorAll(`.player${i}`);

inputs.forEach(input=>{

total += Number(input.value || 0);

});

result += `
<p>
プレイヤー${i} : ${total}
</p>
`;

}

result += `
<hr>
<p>
レート : ${document.getElementById('rate').value}
</p>

<p>
ウマオカ : ${document.getElementById('uma').value}
</p>
`;


document
.getElementById('totalResult')
.innerHTML = result;


document
.getElementById('settlementResult')
.innerHTML = result;

}

renderPlayers();
function loadPlayers(){

const selects = ["p1","p2","p3","p4"];

selects.forEach(id=>{

const select =
document.getElementById(id);

select.innerHTML =
'<option value="">選択</option>';

for(const name in players){

select.innerHTML += `
<option value="${name}">
${name}
</option>
`;

}

});

}

loadPlayers();

function calculateTotal(){

const rate =
Number(
document.getElementById('rate').value
);

let result =
'<h3>精算結果</h3>';

for(let i=1;i<=4;i++){

let total = 0;

document
.querySelectorAll(`.player${i}`)
.forEach(input=>{

total += Number(input.value || 0);

});

const playerName =
document.getElementById(`p${i}`).value;

const money = total * rate;

result += `
<div class="box">
${playerName}
:
${money.toLocaleString()}円
</div>
`;

}

document
.getElementById('totalResult')
.innerHTML = result;

}
function loadPlayerSelects(){

const ids = [
'player1Select',
'player2Select',
'player3Select',
'player4Select'
];

ids.forEach(id=>{

const select =
document.getElementById(id);

select.innerHTML = '';

for(const name in players){

select.innerHTML += `
<option value="${name}">
${name}
</option>
`;

}

});

}

loadPlayerSelects();
</script>

</body>
</html>
